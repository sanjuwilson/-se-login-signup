<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <form class="form-card">
      <h1>Signup</h1>

      <div class="form-group">
        <label for="first-name">First Name</label>
        <input type="text" id="first-name" name="firstName" placeholder="Enter your first name" required />
      </div>

      <div class="form-group">
        <label for="last-name">Last Name</label>
        <input type="text" id="last-name" name="lastName" placeholder="Enter your last name" required />
      </div>

      <div class="form-group">
        <label for="signup-userid">User ID</label>
        <input type="text" id="signup-userid" name="userid" placeholder="Create a user id" required />
      </div>

      <div class="form-group">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" name="password" placeholder="Create a password" required />
      </div>

      <button type="submit" class="btn">Submit</button>

      <p class="switch-link">
        Already have an account?
        <a href="login.html">Login</a>
      </p>
    </form>
  </div>
</body>
</html>
